name: Build and publish offline installers

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

env:
  RUNTIME_ASSET_TAG: runtime-assets-v0.1.0

jobs:
  prepare-releases:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Create platform release drafts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for platform in macos windows; do
            release_tag="${GITHUB_REF_NAME}-${platform}"
            gh release view "$release_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
              gh release create "$release_tag" \
                --repo "$GITHUB_REPOSITORY" \
                --target "$GITHUB_SHA" \
                --draft \
                --latest=false \
                --title "虚荣英雄模型查看器 ${GITHUB_REF_NAME} (${platform})" \
                --notes "完整离线安装包，已包含模型、贴图、动画和界面资源。"
          done

  build:
    needs: prepare-releases
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS-arm64
            release: macos
            shell_args: --mac --arm64
            installer_args: --mac dmg --arm64
            prepackaged: dist-shell/mac-arm64/虚荣英雄模型查看器.app
            app_asar: dist-shell/mac-arm64/虚荣英雄模型查看器.app/Contents/Resources/app.asar
            extension: dmg
          - os: macos-latest
            name: macOS-x64
            release: macos
            shell_args: --mac --x64
            installer_args: --mac dmg --x64
            prepackaged: dist-shell/mac/虚荣英雄模型查看器.app
            app_asar: dist-shell/mac/虚荣英雄模型查看器.app/Contents/Resources/app.asar
            extension: dmg
          - os: windows-latest
            name: Windows-x64
            release: windows
            shell_args: --win --x64
            installer_args: --win nsis --x64
            prepackaged: dist-shell/win-unpacked
            app_asar: dist-shell/win-unpacked/resources/app.asar
            extension: exe
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          npm ci
          python -m pip install --disable-pip-version-check zstandard

      - name: Build platform shell
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: >-
          npx electron-builder --dir ${{ matrix.shell_args }}
          --config electron-builder.prebuilt.yml
          --config.directories.output=dist-shell
          --publish never

      - name: Restore complete offline application
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .runtime-assets
          gh release download "$RUNTIME_ASSET_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "runtime-app.asar.zst.part-*" \
            --dir .runtime-assets
          python scripts/restore-release-app.py \
            --parts-dir .runtime-assets \
            --output "${{ matrix.app_asar }}"

      - name: Sign macOS application locally
        if: runner.os == 'macOS'
        shell: bash
        run: codesign --force --deep --sign - "${{ matrix.prepackaged }}"

      - name: Build offline installer
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: >-
          npx electron-builder ${{ matrix.installer_args }}
          --prepackaged "${{ matrix.prepackaged }}"
          --config electron-builder.prebuilt.yml
          --config.directories.output=dist
          --publish never

      - name: Upload installer to platform release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_tag="${GITHUB_REF_NAME}-${{ matrix.release }}"
          for installer in dist/*.${{ matrix.extension }}; do
            gh release upload "$release_tag" "$installer" --repo "$GITHUB_REPOSITORY" --clobber
          done

  publish-releases:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish completed platform releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${GITHUB_REF_NAME}-macos" --repo "$GITHUB_REPOSITORY" --draft=false
          gh release edit "${GITHUB_REF_NAME}-windows" --repo "$GITHUB_REPOSITORY" --draft=false
